name: Create Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get date
        id: meta
        run: |
          DATE=$(TZ='Europe/Madrid' date +'%d/%m/%Y %H:%M')
          TAG=$(TZ='Europe/Madrid' date +'%Y%m%d%H%M%S')
          echo "tag=v${TAG}" >> $GITHUB_OUTPUT
          echo "name=Traduccion SC ${DATE}" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          mkdir -p zip_build/Data/Localization/spanish_\(spain\)
          cp Data/Localization/spanish_\(spain\)/global.ini zip_build/Data/Localization/spanish_\(spain\)/global.ini
          cd zip_build && zip -r ../traduccion_sc.zip Data

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: traduccion_sc.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
