planetcollect_legal_desc_0008=Acabamos de recibir una recogida programada por ~mission(Client) -\n\nPARA: ~mission(Contractor)\nFROM: ~mission(Client)\n'We've tenemos ~mission(Item) que nos gustaría que recogieran y llevaran a ~mission(Destination). ~mission(Timed)Thanks!'\n\nNecesita una nave cerca de ~mission(Location) para gestionar la entrega. Tarifas competitivas. Se valorará la experiencia previa como mensajero o repartidor.
planetcollect_legal_desc_0010=Me informaron que ~mission(Client) está buscando contratar una nave para entregar un pedido de ~mission(Item) desde ~mission(Location) a ~mission(Destination).. ~mission(Timed)Pay no es negociable. Se espera que la nave proporcione su propio seguro.
planetcollect_ore_desc_0007=Se busca contratar una nave para entregar un pedido de ~mission(Location) a ~mission(Destination).. ~mission(Timed)Pay no es negociable. Se espera que la nave proporcione su propio seguro.
