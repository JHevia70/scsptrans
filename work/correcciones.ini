item_DescCOOL_ACOM_S02_IceDive_SCItem=Tipo de artículo: Refrigerador\nFabricante: ACOM\nTamaño: 2\nGrado: C\nClase: Competición\n\nLa IceDive ofrece un rendimiento superior a otros refrigeradores medianos de su categoría, aunque esto conlleva el coste de generar altas firmas IR y EM.
item_DescCOOL_ACOM_S02_RapidCool_SCItem=Tipo de artículo: Refrigerador\nFabricante: ACOM\nTamaño: 2\nGrado: D\nClase: Competición\n\nACOM aplica su filosofía de priorizar el rendimiento a este refrigerador mediano. El RapidCool sacrifica la resistencia y durabilidad características para obtener un mejor rendimiento.
item_DescCOOL_AEGS_S01_Polar= Tipo de artículo: Refrigerador\nFabricante: Aegis Dynamics\nTamaño: 1\nGrado: B\nClase: Militar\n\nDiseñada para las altas exigencias del servicio militar diario, el refrigerador Polar de Aegis cuenta con un marco reforzado para una mayor durabilidad. Puede estar seguro de que, cuando se enfrente al fragor del combate, el Polar mantendrá su nave fría.
